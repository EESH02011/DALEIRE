    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .canvas-card {
            width: 800px;
            height: 450px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
        }
        .mesh-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.2;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255,255,255,0.5) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0,0,0,0.3) 0, transparent 50%);
        }
        .code-pattern {
            position: absolute;
            right: -50px;
            bottom: -20px;
            font-family: monospace;
            font-size: 14px;
            color: rgba(255,255,255,0.1);
            transform: rotate(-5deg);
            white-space: pre;
            pointer-events: none;
        }
        .btn-glow {
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
        }
    </style>
</head>

    <div class="canvas-card flex p-12">
